version: '3.8'

services:
  app:
    image: ${GHCR_REGISTRY}/${OWNER_LC}/portfolio:${SHA}
    restart: always
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - '127.0.0.1:3003:3000'
    environment:
      - NODE_ENV=production
      - HOST=127.0.0.1
      - FRONT_TOKEN_SECRET=${FRONT_TOKEN_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
